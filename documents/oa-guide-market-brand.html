<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>常用OA流程指引-市场品牌部</title>
  <meta name="description" content="02常用OA流程指引-市场品牌部 在线阅读">
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --bg: #f8fafd;
      --panel: #ffffff;
      --accent: #1a73e8;
      --accent-strong: #1558b0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    a { color: inherit; }
    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    header {
      padding: 42px 0 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.16;
      letter-spacing: 0;
    }
    .lede {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }
    main { padding: 28px 0 44px; }
    .doc-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .doc-card {
      display: flex;
      min-height: 142px;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-decoration: none;
      transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .doc-card:hover {
      border-color: color-mix(in srgb, var(--accent), var(--line) 35%);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(60, 64, 67, .10);
    }
    .doc-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 680;
    }
    .doc-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .toolbar a,
    .button {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
    }
    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .button.primary:hover { background: var(--accent-strong); }
    .viewer {
      height: calc(100vh - 174px);
      min-height: 620px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .fallback {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    @media (max-width: 720px) {
      header { padding-top: 28px; }
      .viewer {
        height: 72vh;
        min-height: 480px;
      }
    }
    </style>
</head>
<body>

  <header>
    <div class="shell">
      <h1>02常用OA流程指引-市场品牌部</h1>
      <p class="lede">在线阅读 PDF 文档。若浏览器没有显示预览，可以使用下载按钮打开原文件。</p>
    </div>
  </header>
  <main class="shell">
    <div class="toolbar">
      <a href="../index.html">返回目录</a>
      <a class="button primary" href="../pdfs/oa-guide-market-brand.pdf" download>下载 PDF</a>
    </div>
    <section class="viewer" aria-label="02常用OA流程指引-市场品牌部 PDF 阅读器">
      <iframe src="../pdfs/oa-guide-market-brand.pdf#view=FitH" title="02常用OA流程指引-市场品牌部"></iframe>
    </section>
    <p class="fallback">无法预览时，请<a href="../pdfs/oa-guide-market-brand.pdf" download>下载 PDF</a>后查看。</p>
  </main>

</body>
</html>
